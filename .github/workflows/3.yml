name: Build SKRoot to EXE (Direct Compile)
 on:
   push:
     branches: [ main ]
   pull_request:
     branches: [ main ]
 jobs:
   build:
     runs-on: windows-latest
     steps:
     - uses: actions/checkout@v4
     - name: Set up MinGW-w64
       uses: egor-tensin/setup-mingw@v2
       with:
         platform: x64
     - name: Compile all cpp files to exe
       run: |
         g++ -static -static-libgcc -static-libstdc++ -o patch_kernel_root.exe *.cpp
     - name: Upload EXE artifact
       uses: actions/upload-artifact@v4
       with:
         name: skroot-exe
         path: patch_kernel_root.exe
