name: Build SKRoot to EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 用 Windows 环境，自带 MinGW-w64

    steps:
    - uses: actions/checkout@v4

    - name: Set up MinGW-w64
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Build with Make
      run: make  # 执行项目里的 Makefile，生成 exe

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: skroot-exe
        path: ./*.exe  # 把生成的 exe 作为产物上传
